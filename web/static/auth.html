<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fix8</title>
    <!-- SEO Optimization -->
    <meta name="description" content="Log in to Fix8 to securely manage your eye-tracking correction projects and data.">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Auth specific styles overriding some layout defaults */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, rgb(14, 21, 38) 0%, rgb(8, 11, 20) 100%);
        }
        
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(0);
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #2563eb 100%);
            border: none;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--accent-primary);
        }
        
        .auth-toggle {
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-toggle a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }

        /* Abstract Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(56, 189, 248, 0.2);
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.15);
            bottom: -200px;
            right: -100px;
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h1 id="mode-title">Sign In</h1>
            <p id="mode-desc">Welcome back to Fix8 Workspace.</p>
        </div>

        <form id="auth-form">
            <div id="error-msg"></div>
            
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Enter your username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" class="auth-btn" id="submit-btn">Login</button>
        </form>

        <div class="auth-toggle">
            <span id="toggle-text">Don't have an account?</span> 
            <a id="toggle-link">Create one</a>
        </div>
    </div>

    <script>
        let isLogin = true;
        
        const form = document.getElementById('auth-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const toggleLink = document.getElementById('toggle-link');
        const toggleText = document.getElementById('toggle-text');
        const modeTitle = document.getElementById('mode-title');
        const modeDesc = document.getElementById('mode-desc');
        const errorMsg = document.getElementById('error-msg');

        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            errorMsg.style.display = 'none';
            
            if (isLogin) {
                modeTitle.innerText = 'Sign In';
                modeDesc.innerText = 'Welcome back to Fix8 Workspace.';
                submitBtn.innerText = 'Login';
                toggleText.innerText = "Don't have an account?";
                toggleLink.innerText = 'Create one';
            } else {
                modeTitle.innerText = 'Create Account';
                modeDesc.innerText = 'Join the Fix8 platform.';
                submitBtn.innerText = 'Sign Up';
                toggleText.innerText = "Already have an account?";
                toggleLink.innerText = 'Sign In';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const endpoint = isLogin ? '/login' : '/signup';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Processing...';
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    errorMsg.innerText = data.error || 'Authentication failed';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = isLogin ? 'Login' : 'Sign Up';
                } else {
                    window.location.href = data.redirect || '/';
                }
            } catch (err) {
                errorMsg.innerText = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = isLogin ? 'Login' : 'Sign Up';
            }
        });
    </script>
</body>
</html>
