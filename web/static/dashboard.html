<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fix8</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.8);
            transform: translateY(-2px);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }
        
        .project-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            margin-top: 12px;
        }
        
        #empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            display: none;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>My Projects</h1>
            <a href="/logout" class="logout-btn">Log Out</a>
        </div>

        <div id="empty-state">
            <h3>No projects yet</h3>
            <p>Your saved sessions will appear here.</p>
        </div>

        <div class="project-grid" id="project-container">
            <!-- Populated securely by Javascript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('project-container');
            const emptyState = document.getElementById('empty-state');
            
            try {
                const res = await fetch('/api/projects');
                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                const projects = await res.json();
                
                if (!projects || projects.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }
                
                projects.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        <div class="project-title">${p.name}</div>
                        <div class="project-meta">ID: ${p.id}</div>
                        ${p.is_demo ? '<div class="badge">Demo Dataset</div>' : ''}
                    `;
                    
                    card.addEventListener('click', async () => {
                        // Load into the backend engine, then redirect to visualizer
                        card.style.opacity = '0.5';
                        const loadRes = await fetch(`/api/projects/${p.id}/load`, { method: 'POST' });
                        if (loadRes.ok) {
                            window.location.href = '/';
                        } else {
                            card.style.opacity = '1';
                            alert('Failed to load project into engine.');
                        }
                    });
                    
                    container.appendChild(card);
                });
                
            } catch (err) {
                console.error(err);
                emptyState.innerText = "Failed to load projects.";
                emptyState.style.display = 'block';
            }
        });
    </script>
</body>
</html>
