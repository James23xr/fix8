<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fix8</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.8);
            transform: translateY(-2px);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }
        
        .project-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            margin-top: 12px;
        }
        
        #empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            display: none;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(239, 68, 68, 0.15);
            color: rgba(239, 68, 68, 0.7);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
        }
        .project-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(239, 68, 68, 0.8) !important; color: white !important; }

        .upload-zone {
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-zone:hover, .upload-zone.dragover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent-primary);
        }

        .upload-zone p {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .upload-zone span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>My Projects</h1>
            <a href="/logout" class="logout-btn">Log Out</a>
        </div>

        <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept=".json,.asc" style="display: none;">
            <p>Drag and drop trial data here</p>
            <span>Supports .json and .asc files</span>
            <div id="upload-progress" style="margin-top: 10px; color: var(--accent-secondary); display: none;">Uploading...</div>
        </div>

        <div id="empty-state">
            <h3>No projects yet</h3>
            <p>Your saved sessions will appear here.</p>
        </div>

        <div class="project-grid" id="project-container">
            <!-- Populated securely by Javascript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('project-container');
            const emptyState = document.getElementById('empty-state');
            
            try {
                const res = await fetch('/api/projects');
                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                const projects = await res.json();
                
                if (!projects || projects.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }
                
                projects.forEach(addProjectCard);
                
            } catch (err) {
                console.error(err);
                emptyState.innerText = "Failed to load projects.";
                emptyState.style.display = 'block';
            }

            function addProjectCard(p) {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <button class="delete-btn" title="Delete project">&#x2715;</button>
                    <div class="project-title">${p.name}</div>
                    <div class="project-meta">ID: ${p.id}</div>
                    ${p.is_demo ? '<div class="badge">Demo Dataset</div>' : ''}
                `;

                card.querySelector('.delete-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm(`Delete "${p.name}"? This cannot be undone.`)) return;
                    const res = await fetch(`/api/projects/${p.id}`, { method: 'DELETE' });
                    if (res.ok) {
                        card.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.95)';
                        setTimeout(() => {
                            card.remove();
                            if (!container.querySelector('.project-card')) {
                                emptyState.style.display = 'block';
                            }
                        }, 200);
                    } else {
                        alert('Failed to delete project.');
                    }
                });

                card.addEventListener('click', async () => {
                    card.style.opacity = '0.5';
                    const loadRes = await fetch(`/api/projects/${p.id}/load`, { method: 'POST' });
                    if (loadRes.ok) {
                        window.location.href = '/';
                    } else {
                        card.style.opacity = '1';
                        alert('Failed to load project into engine.');
                    }
                });

                if (container.firstChild) {
                    container.insertBefore(card, container.firstChild);
                } else {
                    container.appendChild(card);
                }
            }

            // Drag and Drop Upload Logic
            const uploadZone = document.getElementById('upload-zone');
            const fileInput = document.getElementById('file-input');
            const uploadProgress = document.getElementById('upload-progress');

            uploadZone.addEventListener('click', () => fileInput.click());

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('dragover');
            });

            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('dragover');
            });

            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    handleUpload(e.dataTransfer.files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleUpload(e.target.files[0]);
                }
            });

            async function handleUpload(file) {
                if (!file.name.endsWith('.json') && !file.name.endsWith('.asc')) {
                    alert('Only .json and .asc files are currently supported.');
                    return;
                }
                
                uploadProgress.style.display = 'block';
                uploadProgress.innerText = `Uploading ${file.name}...`;
                uploadZone.style.pointerEvents = 'none';

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error || 'Upload failed');
                    }
                    
                    const newProject = await res.json();
                    emptyState.style.display = 'none';
                    addProjectCard(newProject.project);
                    
                    uploadProgress.innerText = 'Upload successful!';
                    setTimeout(() => { uploadProgress.style.display = 'none'; }, 3000);
                } catch (err) {
                    console.error(err);
                    alert('Upload Error: ' + err.message);
                    uploadProgress.style.display = 'none';
                } finally {
                    uploadZone.style.pointerEvents = 'all';
                    fileInput.value = ''; // clear input
                }
            }
        });
    </script>
</body>
</html>
