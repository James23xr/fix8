<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fix8</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.8);
            transform: translateY(-2px);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .project-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }
        
        .project-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            margin-top: 12px;
        }
        
        #empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            display: none;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(239, 68, 68, 0.15);
            color: rgba(239, 68, 68, 0.7);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
        }
        .project-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(239, 68, 68, 0.8) !important; color: white !important; }

        .upload-zone {
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-zone:hover, .upload-zone.dragover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent-primary);
        }

        .upload-zone p {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .upload-zone span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .staged-files {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .staged-file {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .staged-file.trial { background: rgba(56, 189, 248, 0.15); color: #7dd3fc; }
        .staged-file.image { background: rgba(129, 140, 248, 0.15); color: #a5b4fc; }
        .staged-file .remove-staged {
            cursor: pointer; opacity: 0.6; font-size: 0.9rem;
        }
        .staged-file .remove-staged:hover { opacity: 1; }

        .image-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
        }
        .image-badge.has-image { background: rgba(129, 140, 248, 0.2); color: #a5b4fc; }
        .image-badge.no-image { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>My Projects</h1>
            <a href="/logout" class="logout-btn">Log Out</a>
        </div>

        <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept=".json,.asc,.png,.jpg,.jpeg" multiple style="display: none;">
            <p>Drop trial + stimulus image here</p>
            <span>Trial: .json / .asc &nbsp;·&nbsp; Image: .png / .jpg (optional)</span>
            <div class="staged-files" id="staged-files"></div>
            <div id="upload-progress" style="margin-top: 10px; color: var(--accent-secondary); display: none;">Uploading...</div>
            <button class="btn btn-primary" id="upload-btn" style="margin-top: 12px; width: auto; padding: 8px 24px; display: none;">Upload</button>
        </div>

        <div id="empty-state">
            <h3>No projects yet</h3>
            <p>Your saved sessions will appear here.</p>
        </div>

        <div class="project-grid" id="project-container">
            <!-- Populated securely by Javascript -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('project-container');
            const emptyState = document.getElementById('empty-state');
            
            try {
                const res = await fetch('/api/projects');
                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                const projects = await res.json();
                
                if (!projects || projects.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }
                
                projects.forEach(addProjectCard);
                
            } catch (err) {
                console.error(err);
                emptyState.innerText = "Failed to load projects.";
                emptyState.style.display = 'block';
            }

            function addProjectCard(p) {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <button class="delete-btn" title="Delete project">&#x2715;</button>
                    <div class="project-title">${p.name}</div>
                    <div class="project-meta">ID: ${p.id}</div>
                    ${p.is_demo ? '<div class="badge">Demo Dataset</div>' : ''}
                    ${p.has_image
                        ? `<div class="image-badge has-image">🖼 ${p.image_name}</div>`
                        : '<div class="image-badge no-image">⚠ No stimulus image</div>'}
                `;

                card.querySelector('.delete-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm(`Delete "${p.name}"? This cannot be undone.`)) return;
                    const res = await fetch(`/api/projects/${p.id}`, { method: 'DELETE' });
                    if (res.ok) {
                        card.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.95)';
                        setTimeout(() => {
                            card.remove();
                            if (!container.querySelector('.project-card')) {
                                emptyState.style.display = 'block';
                            }
                        }, 200);
                    } else {
                        alert('Failed to delete project.');
                    }
                });

                card.addEventListener('click', async () => {
                    card.style.opacity = '0.5';
                    const loadRes = await fetch(`/api/projects/${p.id}/load`, { method: 'POST' });
                    if (loadRes.ok) {
                        window.location.href = '/';
                    } else {
                        card.style.opacity = '1';
                        alert('Failed to load project into engine.');
                    }
                });

                if (container.firstChild) {
                    container.insertBefore(card, container.firstChild);
                } else {
                    container.appendChild(card);
                }
            }

            // Drag and Drop Upload Logic — auto-sorts files by type
            const uploadZone = document.getElementById('upload-zone');
            const fileInput = document.getElementById('file-input');
            const uploadProgress = document.getElementById('upload-progress');
            const stagedFilesEl = document.getElementById('staged-files');
            const uploadBtn = document.getElementById('upload-btn');
            let stagedTrial = null;
            let stagedImage = null;

            const TRIAL_EXTS = ['.json', '.asc'];
            const IMAGE_EXTS = ['.png', '.jpg', '.jpeg'];

            function getExt(name) { return '.' + name.split('.').pop().toLowerCase(); }

            function stageFiles(files) {
                for (const f of files) {
                    const ext = getExt(f.name);
                    if (TRIAL_EXTS.includes(ext)) stagedTrial = f;
                    else if (IMAGE_EXTS.includes(ext)) stagedImage = f;
                    else alert(`Unsupported file type: ${f.name}`);
                }
                renderStaged();
            }

            function renderStaged() {
                stagedFilesEl.innerHTML = '';
                if (stagedTrial) {
                    stagedFilesEl.innerHTML += `<span class="staged-file trial">📄 ${stagedTrial.name} <span class="remove-staged" data-type="trial">✕</span></span>`;
                }
                if (stagedImage) {
                    stagedFilesEl.innerHTML += `<span class="staged-file image">🖼 ${stagedImage.name} <span class="remove-staged" data-type="image">✕</span></span>`;
                }
                uploadBtn.style.display = stagedTrial ? 'inline-flex' : 'none';
                // wire remove buttons
                stagedFilesEl.querySelectorAll('.remove-staged').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (btn.dataset.type === 'trial') stagedTrial = null;
                        else stagedImage = null;
                        renderStaged();
                    });
                });
            }

            uploadZone.addEventListener('click', (e) => {
                if (e.target === uploadBtn || e.target.closest('.remove-staged')) return;
                fileInput.click();
            });

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('dragover');
            });

            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('dragover');
            });

            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) stageFiles(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) stageFiles(e.target.files);
                fileInput.value = '';
            });

            uploadBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (!stagedTrial) return;

                uploadProgress.style.display = 'block';
                uploadProgress.innerText = `Uploading ${stagedTrial.name}${stagedImage ? ' + ' + stagedImage.name : ''}...`;
                uploadBtn.disabled = true;

                const formData = new FormData();
                formData.append('file', stagedTrial);
                if (stagedImage) formData.append('image', stagedImage);

                try {
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error || 'Upload failed');
                    }

                    const newProject = await res.json();
                    emptyState.style.display = 'none';
                    addProjectCard(newProject.project);

                    uploadProgress.innerText = 'Upload successful!';
                    setTimeout(() => { uploadProgress.style.display = 'none'; }, 3000);
                    stagedTrial = null;
                    stagedImage = null;
                    renderStaged();
                } catch (err) {
                    console.error(err);
                    alert('Upload Error: ' + err.message);
                    uploadProgress.style.display = 'none';
                } finally {
                    uploadBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
