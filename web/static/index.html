<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix8 Web | Advanced Eye Tracking</title>
    <!-- Use Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div>
                <h1>Fix8 Web</h1>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Session Isolated Workspace</p>
            </div>

            <div class="control-group">
                <h3>Data Source</h3>
                <button id="btn-load-demo" class="btn btn-primary">Load Demo Trial</button>
            </div>

            <div class="control-group">
                <h3>Distortions</h3>
                <div class="control-item">
                    <label for="noise-slider">Noise Threshold</label>
                    <span id="noise-val" style="color: var(--accent-primary); font-weight: bold;">5</span>
                </div>
                <input type="range" id="noise-slider" min="1" max="20" value="5">
                <button id="btn-apply-noise" class="btn">Apply Noise</button>
            </div>
            
            <div style="flex: 1;"></div>
            
            <div style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">
                Powered by Flask & Canvas
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Ready</span>
                </div>
                <div style="font-size: 0.85rem;">
                    Fixations Loaded: <span id="fix-count" style="color: var(--accent-primary); font-weight: bold; font-size: 1.1rem;">0</span>
                </div>
            </header>
            
            <div class="canvas-container" id="canvas-container">
                <canvas id="eye-canvas"></canvas>
                <div id="tooltip"></div>
            </div>
            
            <!-- Loading Overlay -->
            <div id="loader">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                    <path d="M12 2a10 10 0 0 1 10 10"></path>
                </svg>
            </div>
        </main>
    </div>

    <style>
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <script src="/js/visualizer.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
