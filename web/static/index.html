<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix8 Web | Advanced Eye Tracking</title>
    <!-- Use Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app-container">
        <!-- Sidebar -->
        <aside class="sidebar left-sidebar">
            <div>
                <h1>Fix8 Web</h1>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Session Isolated Workspace</p>
            </div>

            <div class="control-group" style="display: flex; gap: 8px;">
                <a href="/dashboard" class="btn" style="flex:1; text-align:center; padding: 10px; text-decoration:none; background:rgba(255,255,255,0.1)">Dashboard</a>
                <a href="/logout" class="btn" style="flex:1; text-align:center; padding: 10px; text-decoration:none; background:rgba(239, 68, 68, 0.4)">Logout</a>
            </div>

            <div class="control-group">
                <h3>Data Source</h3>
                <button id="btn-load-demo" class="btn btn-primary">Load Active Module</button>
            </div>

            <div class="control-group">
                <h3>Distortions</h3>
                <div class="control-item">
                    <label for="noise-slider">Noise Threshold</label>
                    <span id="noise-val" style="color: var(--accent-primary); font-weight: bold;">5</span>
                </div>
                <input type="range" id="noise-slider" min="1" max="20" value="5">
                <button id="btn-apply-noise" class="btn">Apply Noise</button>
            </div>
            
            <div style="flex: 1;"></div>
            
            <div style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">
                Powered by Flask & Canvas
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Ready</span>
                </div>
                <div style="font-size: 0.85rem;">
                    Fixations Loaded: <span id="fix-count" style="color: var(--accent-primary); font-weight: bold; font-size: 1.1rem;">0</span>
                </div>
            </header>
            
            <div class="canvas-container" id="canvas-container">
                <canvas id="eye-canvas"></canvas>
                <div id="tooltip"></div>
            </div>
            
            <!-- Loading Overlay -->
            <div id="loader">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                    <path d="M12 2a10 10 0 0 1 10 10"></path>
                </svg>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="sidebar right-sidebar">
            <div class="control-group">
                <h3 style="color: var(--accent-secondary);">Filters Toolkit</h3>
                <div class="control-item" style="flex-direction: column; align-items: stretch; gap: 4px;">
                    <label>Duration Threshold (ms)</label>
                    <input type="number" id="filter-duration" placeholder="e.g. 80" style="padding: 8px; border-radius: 4px; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); color: #fff;">
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn" style="flex: 1; font-size: 0.8rem;">&lt; Less</button>
                    <button class="btn" style="flex: 1; font-size: 0.8rem;">&gt; Greater</button>
                </div>
                <button class="btn" style="border-color: rgba(239, 68, 68, 0.4); margin-top: 8px;">Filter Outliers</button>
                <button class="btn" style="margin-top: 4px;">Merge Fixations</button>
            </div>

            <div class="control-group" style="margin-top: 1.5rem;">
                <h3 style="color: #fbbf24;">Algorithms</h3>
                
                <label style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: -4px;">Automatic Corrections</label>
                <select style="padding: 10px; border-radius: 4px; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); color: #fff; width: 100%;">
                    <option value="">Select Algorithm...</option>
                    <option value="warp">Warp</option>
                    <option value="attach">Attach</option>
                    <option value="chain">Chain</option>
                    <option value="cluster">Cluster</option>
                </select>
                <button class="btn btn-primary" style="margin-top: 4px;">Run Automatic</button>
            </div>
        </aside>
    </div>

    <style>
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>

    <script src="/js/visualizer.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
